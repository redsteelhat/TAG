services:
  postgres:
    image: postgres:16-alpine
    container_name: tag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tag_finance
      POSTGRES_USER: tag_user
      POSTGRES_PASSWORD: tag_password
    ports:
      - "5432:5432"
    volumes:
      - tag_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tag_user -d tag_finance"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  tag_postgres_data:

