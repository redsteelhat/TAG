name: Repo Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docs-and-project-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check required docs
        run: |
          test -f PRD.md
          test -f MVP_SCOPE.md
          test -f USER_FLOWS.md
          test -f WIREFRAMES.md
          test -f DB_SCHEMA_DRAFT.md
          test -f API_CONTRACT_DRAFT.md
          test -f DESIGN_SYSTEM_STARTER.md

      - name: Setup pnpm if project exists
        if: hashFiles('package.json') != ''
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - name: Setup Node if project exists
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies if project exists
        if: hashFiles('package.json') != ''
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client if project exists
        if: hashFiles('apps/api/prisma/schema.prisma') != ''
        run: pnpm db:generate

      - name: Run checks if configured
        if: hashFiles('package.json') != ''
        run: |
          pnpm lint
          pnpm test
          pnpm build
