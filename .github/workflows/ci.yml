name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  monorepo-check:
    name: Monorepo Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect project files
        id: detect
        shell: bash
        run: |
          if [ -f package.json ]; then
            echo "has_node_project=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_node_project=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -f prisma/schema.prisma ] || [ -f apps/api/prisma/schema.prisma ]; then
            echo "has_prisma=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_prisma=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.detect.outputs.has_node_project == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Enable pnpm
        if: steps.detect.outputs.has_node_project == 'true'
        run: corepack enable

      - name: Install dependencies
        if: steps.detect.outputs.has_node_project == 'true'
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: steps.detect.outputs.has_node_project == 'true'
        run: pnpm run lint --if-present

      - name: Typecheck
        if: steps.detect.outputs.has_node_project == 'true'
        run: pnpm run typecheck --if-present

      - name: Test
        if: steps.detect.outputs.has_node_project == 'true'
        run: pnpm run test --if-present

      - name: Build
        if: steps.detect.outputs.has_node_project == 'true'
        run: pnpm run build --if-present

      - name: Prisma validate
        if: steps.detect.outputs.has_node_project == 'true' && steps.detect.outputs.has_prisma == 'true'
        env:
          DATABASE_URL: postgresql://tag_user:tag_password@localhost:5432/tag_finance?schema=public
        run: pnpm --filter @tag/api db:validate

      - name: No project yet
        if: steps.detect.outputs.has_node_project == 'false'
        run: echo "No package.json yet. CI skeleton is ready and will run project checks after scaffolding."
